webdriver {
    driver = appium
    autodownload = false
}

appium {
    hub = "http://127.0.0.1:4723"
    platformName = "Android"
    appPackage = "edu.pe.cibertec.gymtrakcer"
    appActivity = "edu.pe.cibertec.gymtrakcer.MainActivity"
    deviceName = "emulator-5554"
    automationName = "UiAutomator2"
    noReset = false

    process.desired.capabilities = true
    additional.capabilities = "appPackage,appActivity,deviceName,automationName,noReset"
}

serenity {
    take.screenshots = AFTER_EACH_STEP
    restart.browser.for.each = scenario
}
